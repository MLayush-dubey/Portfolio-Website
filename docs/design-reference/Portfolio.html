<style>
  :root{
    /* Default phosphor-green palette */
    --bg:           oklch(0.135 0.012 250);
    --bg-1:         oklch(0.165 0.014 250);
    --bg-2:         oklch(0.195 0.014 250);
    --line:         oklch(0.27 0.012 250);
    --line-soft:    oklch(0.22 0.012 250);
    --fg:           oklch(0.96 0.005 250);
    --fg-mute:      oklch(0.68 0.012 250);
    --fg-dim:       oklch(0.5 0.012 250);

    --accent:       oklch(0.86 0.18 145);
    --accent-glow:  oklch(0.86 0.18 145 / 0.35);
    --accent-soft:  oklch(0.86 0.18 145 / 0.12);
    --accent-2:     oklch(0.82 0.16 75);

    --danger:       oklch(0.72 0.18 25);

    --r-sm: 4px;
    --r-md: 8px;
    --r-lg: 14px;

    --f-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --f-body:    "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
    --f-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:var(--f-body);
    font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility}
  body{
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, oklch(0.86 0.18 145 / 0.06), transparent 60%),
      radial-gradient(circle at 0% 100%, oklch(0.82 0.16 75 / 0.04), transparent 50%);
    background-attachment: fixed;
    min-height:100vh;
    overflow-x:hidden;
  }
  /* dotted grid underlay */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image: radial-gradient(circle, oklch(0.96 0.005 250 / 0.045) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: 0 0;
    mask-image: radial-gradient(ellipse 90% 100% at 50% 30%, #000 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 90% 100% at 50% 30%, #000 30%, transparent 90%);
  }
  /* scanlines */
  body.scanlines::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
    background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(255,255,255,.018) 2px, rgba(255,255,255,.018) 3px);
    mix-blend-mode: overlay;
  }

  ::selection{ background: var(--accent-soft); color: var(--fg); }

  a{color:inherit;text-decoration:none}

  h1,h2,h3,h4{font-family:var(--f-display);font-weight:500;letter-spacing:-0.02em;margin:0}
  h1{font-size:clamp(48px, 7vw, 96px);line-height:0.95;letter-spacing:-0.04em;font-weight:500}
  h2{font-size:clamp(28px,3.4vw,44px);line-height:1.05;letter-spacing:-0.025em}
  h3{font-size:20px;line-height:1.2}
  p{margin:0}

  .mono{font-family:var(--f-mono);font-feature-settings:"ss01","ss02"}
  .dim{color:var(--fg-mute)}
  .dimmer{color:var(--fg-dim)}
  .accent{color:var(--accent)}

  /* layout containers */
  #app{position:relative;z-index:1}
  .wrap{max-width:1320px;margin:0 auto;padding:0 40px}
  @media (max-width:720px){ .wrap{padding:0 20px} }

  /* section header */
  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:42px;
    padding-bottom:18px;border-bottom:1px solid var(--line-soft)}
  .sec-num{font-family:var(--f-mono);font-size:11px;letter-spacing:0.1em;
    color:var(--accent);text-transform:uppercase}
  .sec-title{font-family:var(--f-display);font-size:14px;text-transform:uppercase;
    letter-spacing:0.2em;color:var(--fg-mute);font-weight:500}
  .sec-flex{flex:1;height:1px;background:var(--line-soft)}
  .sec-meta{font-family:var(--f-mono);font-size:11px;color:var(--fg-dim)}

  /* section spacing */
  section.sec{padding:96px 0;position:relative}
  @media (max-width:720px){ section.sec{padding:64px 0} }

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;
    padding:10px 16px;border:1px solid var(--line);background:transparent;
    color:var(--fg);font-family:var(--f-mono);font-size:12px;letter-spacing:0.04em;
    cursor:pointer;border-radius:var(--r-sm);transition:all .15s;text-transform:uppercase}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .btn.primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{box-shadow:0 0 0 4px var(--accent-soft); background:var(--accent)}

  /* chips/badges */
  .chip{display:inline-flex;align-items:center;gap:6px;
    padding:3px 8px;border:1px solid var(--line);border-radius:999px;
    font-family:var(--f-mono);font-size:10.5px;color:var(--fg-mute);
    letter-spacing:0.04em;text-transform:uppercase;background:var(--bg-1)}
  .chip.alive::before{content:"";width:6px;height:6px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 8px var(--accent-glow);
    animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* card */
  .card{background:var(--bg-1);border:1px solid var(--line-soft);border-radius:var(--r-md);
    transition:border-color .2s, transform .2s}
  .card:hover{border-color:var(--line)}

  /* link underline */
  .link{position:relative;color:var(--fg);transition:color .15s}
  .link:hover{color:var(--accent)}
  .link::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;
    background:currentColor;transform:scaleX(0);transform-origin:right;transition:transform .25s}
  .link:hover::after{transform:scaleX(1);transform-origin:left}

  /* glow text for accent */
  .glow{ text-shadow: 0 0 24px var(--accent-glow) }

  /* hide for screen readers */
  .sr{position:absolute;left:-9999px}

  /* loading dots */
  .dots span{display:inline-block;animation:dot 1.4s infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}

  /* utility */
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:12px}
</style>
